  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 #131D13;\n    --ink-mid:   #4a5a49;\n    --ink-light: #8a9e89;\n    --green:     oklch(36% 0.13 145);\n    --green-l:   oklch(93% 0.05 145);\n    --green-m:   oklch(52% 0.12 145);\n    --gold:      oklch(68% 0.12 80);\n    --radius:    3px;\n    --max:       1100px;\n    --serif:     'DM Serif Display', Georgia, serif;\n    --sans:      'DM Sans', system-ui, sans-serif;\n  }\n\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    background: var(--bg);\n    color: var(--ink);\n    font-family: var(--sans);\n    font-size: 16px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  .container { max-width: var(--max); margin: 0 auto; padding: 0 40px; }\n\n  /* NAV */\n  nav {\n    position: sticky; top: 0; z-index: 100;\n    background: rgba(245,247,244,0.92);\n    backdrop-filter: blur(12px);\n    border-bottom: 1px solid rgba(19,29,19,0.08);\n  }\n  .nav-inner {\n    display: flex; align-items: center; justify-content: space-between;\n    max-width: var(--max); margin: 0 auto; padding: 18px 40px;\n  }\n  .nav-logo {\n    font-family: var(--serif); font-size: 20px;\n    color: var(--ink); text-decoration: none;\n    letter-spacing: -0.01em; white-space: nowrap;\n  }\n  .nav-links { display: flex; gap: 36px; list-style: none; align-items: center; }\n  .nav-links a {\n    font-size: 13px; font-weight: 500; color: var(--ink-mid);\n    text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase;\n    transition: color 0.2s;\n  }\n  .nav-links a:hover { color: var(--green); }\n  .nav-cta {\n    background: var(--green); color: #fff !important;\n    padding: 9px 20px; font-size: 13px !important; font-weight: 600 !important;\n    text-decoration: none; transition: opacity 0.2s !important;\n    letter-spacing: 0.03em !important; text-transform: none !important;\n  }\n  .nav-cta:hover { opacity: 0.85 !important; color: #fff !important; }\n\n  /* HERO */\n  .hero { padding: 96px 0 80px; border-bottom: 1px solid rgba(19,29,19,0.1); }\n  .hero-inner {\n    display: grid; grid-template-columns: 1fr 360px;\n    gap: 64px; align-items: center;\n    max-width: var(--max); margin: 0 auto; padding: 0 40px;\n  }\n  .hero-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--green-m);\n    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;\n  }\n  .hero-label::before {\n    content: ''; display: inline-block; width: 24px; height: 1.5px;\n    background: var(--green-m); flex-shrink: 0;\n  }\n  .hero-title {\n    font-family: var(--serif); font-size: 48px; line-height: 1.2;\n    letter-spacing: -0.02em; color: var(--ink);\n    margin: 0 0 28px 0; display: block;\n  }\n  .hero-title em { font-style: italic; color: var(--green); }\n  .hero-desc {\n    font-size: 17px; color: var(--ink-mid); line-height: 1.7;\n    max-width: 500px; margin-bottom: 36px; font-weight: 400;\n  }\n  .hero-actions { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }\n  .btn-primary {\n    background: var(--green); color: #fff;\n    padding: 13px 28px; font-size: 14px; font-weight: 600;\n    text-decoration: none; transition: opacity 0.2s;\n    letter-spacing: 0.01em; display: inline-block;\n  }\n  .btn-primary:hover { opacity: 0.85; }\n  .btn-ghost {\n    color: var(--ink-mid); font-size: 14px; font-weight: 500;\n    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;\n    border-bottom: 1px solid transparent;\n    transition: color 0.2s, border-color 0.2s;\n  }\n  .btn-ghost:hover { color: var(--green); border-color: var(--green); }\n  .hero-photo {\n    aspect-ratio: 1/1;\n    border: 1px solid rgba(19,29,19,0.1);\n    background-size: cover; background-position: center top;\n    background-color: var(--bg-alt);\n    position: relative; overflow: hidden;\n  }\n\n  /* STATS */\n  .stats { background: var(--bg-dark); color: #fff; }\n  .stats-inner {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    max-width: var(--max); margin: 0 auto;\n    border-left: 1px solid rgba(255,255,255,0.06);\n  }\n  .stat-item { padding: 36px 32px; border-right: 1px solid rgba(255,255,255,0.06); }\n  .stat-number {\n    font-family: var(--serif); font-size: 42px; line-height: 1;\n    color: var(--green-m); margin-bottom: 6px; letter-spacing: -0.02em;\n  }\n  .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 400; line-height: 1.4; }\n\n  /* SECTIONS */\n  section { padding: 88px 0; }\n  section + section { border-top: 1px solid rgba(19,29,19,0.08); }\n  .section-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--green-m);\n    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;\n  }\n  .section-label::before {\n    content: ''; display: inline-block; width: 24px; height: 1.5px;\n    background: var(--green-m); flex-shrink: 0;\n  }\n  .section-title {\n    font-family: var(--serif); font-size: clamp(28px, 3vw, 40px);\n    line-height: 1.15; letter-spacing: -0.02em; color: var(--ink); margin-bottom: 20px;\n  }\n  .section-title em { font-style: italic; color: var(--green); }\n  .section-intro { font-size: 16px; color: var(--ink-mid); line-height: 1.7; max-width: 560px; margin-bottom: 48px; }\n\n  /* OVER MIJ */\n  .about-grid { display: grid; grid-template-columns: 300px 1fr; gap: 72px; align-items: start; }\n  .about-visual { position: sticky; top: 100px; }\n  .about-img {\n    aspect-ratio: 1/1;\n    border: 1px solid rgba(50,90,50,0.15);\n    background-size: cover; background-position: center top;\n    background-color: var(--green-l); margin-bottom: 16px;\n  }\n  .about-caption {\n    font-size: 12px; color: var(--ink-light); font-style: italic; line-height: 1.6;\n    padding-top: 12px; border-top: 1px solid rgba(19,29,19,0.08);\n  }\n  .about-body p { font-size: 16px; color: var(--ink-mid); line-height: 1.8; margin-bottom: 20px; }\n  .about-body p strong { color: var(--ink); font-weight: 600; }\n  .about-quote {\n    border-left: 3px solid var(--green); padding: 16px 0 16px 24px; margin: 32px 0;\n    font-family: var(--serif); font-size: 20px; line-height: 1.5;\n    color: var(--ink); font-style: italic;\n  }\n  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 28px; }\n  .tag {\n    border: 1px solid rgba(50,90,50,0.25); background: var(--green-l);\n    color: var(--green); padding: 5px 13px; font-size: 12px; font-weight: 500;\n    letter-spacing: 0.02em; border-radius: var(--radius);\n  }\n\n  /* WERKWIJZE */\n  .method-section { background: var(--bg-alt); }\n  .method-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }\n  .method-card {\n    background: var(--bg); padding: 40px 32px; position: relative;\n    transition: box-shadow 0.2s;\n  }\n  .method-card:hover { box-shadow: 0 8px 32px rgba(50,90,50,0.10); z-index: 1; }\n  .method-num {\n    font-family: var(--serif); font-size: 52px; line-height: 1;\n    color: var(--green-l); margin-bottom: 20px; display: block; letter-spacing: -0.03em;\n  }\n  .method-title { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 10px; }\n  .method-desc { font-size: 14px; color: var(--ink-mid); line-height: 1.7; }\n\n  /* DIENSTEN */\n  .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; border: 1px solid rgba(19,29,19,0.08); }\n  .service-card {\n    padding: 40px 36px; border: 1px solid rgba(19,29,19,0.08);\n    background: var(--bg); transition: background 0.2s, box-shadow 0.2s;\n    position: relative; cursor: pointer;\n  }\n  .service-card:hover { background: var(--green-l); box-shadow: inset 0 0 0 1.5px var(--green); }\n  .service-card.open { background: var(--green-l); box-shadow: inset 0 0 0 1.5px var(--green); }\n  .service-icon {\n    width: 36px; height: 36px; border: 1.5px solid rgba(50,90,50,0.3);\n    border-radius: 50%; margin-bottom: 20px;\n    display: flex; align-items: center; justify-content: center;\n  }\n  .service-icon svg { width: 16px; height: 16px; stroke: var(--green); fill: none; stroke-width: 1.5; }\n  .service-title { font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }\n  .service-desc { font-size: 14px; color: var(--ink-mid); line-height: 1.7; }\n  .service-detail {\n    font-size: 13px; color: var(--ink-mid); line-height: 1.65;\n    max-height: 0; overflow: hidden;\n    transition: max-height 0.35s ease, opacity 0.3s ease, margin-top 0.3s ease;\n    opacity: 0; margin-top: 0;\n  }\n  .service-card.open .service-detail { max-height: 160px; opacity: 1; margin-top: 12px; }\n  .service-arrow {\n    position: absolute; bottom: 28px; right: 32px;\n    font-size: 18px; color: var(--green-m);\n    transition: opacity 0.2s, transform 0.3s; opacity: 0.4;\n  }\n  .service-card.open .service-arrow { opacity: 1; transform: rotate(90deg); }\n\n  /* EXPERTISE */\n  .expertise-section { background: var(--bg-dark); color: #fff; }\n  .expertise-section .section-label { color: var(--green-m); }\n  .expertise-section .section-label::before { background: var(--green-m); }\n  .expertise-section .section-title { color: #fff; }\n  .expertise-section .section-intro { color: rgba(255,255,255,0.5); }\n  .expertise-tags { display: flex; flex-wrap: wrap; gap: 10px; }\n  .expertise-tag {\n    border: 1px solid rgba(255,255,255,0.15); padding: 7px 16px;\n    font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.75);\n    border-radius: var(--radius);\n    transition: background 0.2s, border-color 0.2s, color 0.2s; cursor: default;\n  }\n  .expertise-tag:hover { background: var(--green); border-color: var(--green); color: #fff; }\n\n  /* CLIENTS */\n  .clients-bar {\n    background: var(--bg-alt);\n    border-top: 1px solid rgba(19,29,19,0.08);\n    border-bottom: 1px solid rgba(19,29,19,0.08);\n    padding: 40px 0;\n  }\n  .clients-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;\n    text-transform: uppercase; color: var(--ink-light);\n    margin-bottom: 24px; text-align: center;\n  }\n  .clients-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 16px; }\n  .client-item {\n    font-size: 13px; font-weight: 500; color: var(--ink-mid);\n    padding: 7px 16px; border: 1px solid rgba(19,29,19,0.12);\n    background: #fff; border-radius: var(--radius); letter-spacing: 0.01em;\n    transition: border-color 0.2s, color 0.2s, background 0.2s;\n    cursor: pointer; position: relative;\n  }\n  .client-item:hover { border-color: var(--green-m); color: var(--green); background: var(--green-l); }\n  .client-popover {\n    position: fixed; background: var(--bg-dark); color: #fff;\n    font-size: 13px; font-family: var(--sans);\n    padding: 10px 14px; border-radius: 3px; max-width: 280px;\n    line-height: 1.5; pointer-events: none; z-index: 999;\n    opacity: 0; transition: opacity 0.15s; box-shadow: 0 4px 16px rgba(0,0,0,0.18);\n  }\n  .client-popover.visible { opacity: 1; }\n\n  /* QUOTES */\n  .quotes-section { background: var(--bg); }\n  .quotes-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr);\n    gap: 24px; margin-bottom: 28px; transition: opacity 0.35s ease;\n  }\n  .quotes-grid.fading { opacity: 0; }\n  .quotes-nav { display: flex; align-items: center; justify-content: center; gap: 16px; }\n  .quotes-prev, .quotes-next {\n    background: none; border: 1.5px solid rgba(19,29,19,0.15);\n    width: 36px; height: 36px; border-radius: 50%;\n    cursor: pointer; font-size: 16px; color: var(--ink-mid);\n    display: flex; align-items: center; justify-content: center;\n    transition: border-color 0.2s, color 0.2s;\n  }\n  .quotes-prev:hover, .quotes-next:hover { border-color: var(--green); color: var(--green); }\n  .quotes-dots { display: flex; gap: 6px; }\n  .quotes-dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: rgba(19,29,19,0.15); cursor: pointer; transition: bac a href=\"#\" class=\"nav-logo\">Martijn de Bruijn<\u002Fa>\n    <ul class=\"nav-links\">\n      <li><a href=\"#over-mij\">Over mij<\u002Fa><\u002Fli>\n      <li><a href=\"#aanpak\">Aanpak<\u002Fa><\u002Fli>\n      <li><a href=\"#diensten\">Diensten<\u002Fa><\u002Fli>\n      <li><a href=\"#quotes\">Aanbevelingen<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\" class=\"nav-cta\">Neem contact op<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<div class=\"hero\">\n  <div class=\"hero-inner\">\n    <div class=\"hero-content\">\n      <div class=\"hero-label\">Business Control &nbsp;·&nbsp; Finance &amp; IT &nbsp;·&nbsp; Project Management<\u002Fdiv>\n      <h1 class=\"hero-title\">\n        Data-driven <em>financiële<br>sturing<\u002Fem> die werkt.\n      <\u002Fh1>\n      <p class=\"hero-desc\">\n        Als Sr. Business Controller en Finance-IT specialist vertaal ik complexe financiële vraagstukken naar heldere dashboards, voorspelbare processen en werkende IT-oplossingen — van strategie tot implementatie.\n      <\u002Fp>\n      <div class=\"hero-actions\">\n        <a href=\"#contact\" class=\"btn-primary\">Neem contact op<\u002Fa>\n        <a href=\"#diensten\" class=\"btn-ghost\">Wat ik doe →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-photo\" style=\"background-image:url(&quot;b5a93907-87ad-4651-b7d6-a71b4707c21a&quot;);\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- STATS -->\n<div class=\"stats\">\n  <div class=\"stats-inner\">\n    <div class=\"stat-item reveal\">\n      <div class=\"stat-number\">20+<\u002Fdiv>\n      <div class=\"stat-label\">jaar ervaring in finance &amp; project control<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-item reveal\">\n      <div class=\"stat-number\">10+<\u002Fdiv>\n      <div class=\"stat-label\">ERP- &amp; IT-implementaties begeleid<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-item reveal\">\n      <div class=\"stat-number\">3<\u002Fdiv>\n      <div class=\"stat-label\">rollen: controller, projectmanager &amp; IT-specialist<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-item reveal\">\n      <div class=\"stat-number\">dag 1<\u002Fdiv>\n      <div class=\"stat-label\">direct inzetbaar, hands-on mentaliteit<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- OVER MIJ -->\n<section id=\"over-mij\">\n  <div class=\"container\">\n    <div class=\"about-grid\">\n      <div class=\"about-visual reveal\">\n        <div class=\"about-img\" style=\"background-image:url(&quot;b5a93907-87ad-4651-b7d6-a71b4707c21a&quot;);\"><\u002Fdiv>\n        <p class=\"about-caption\">Sr. Business Controller &amp; Finance-IT specialist — werkzaam op het snijvlak van finance, data en IT-implementaties.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"about-body\">\n        <div class=\"section-label reveal\">Over mij<\u002Fdiv>\n        <h2 class=\"section-title reveal\">Ik ben Martijn.<\u002Fh2>\n        <p class=\"reveal\">\n          Ik ben <strong>business controller<\u002Fstrong> van huis uit — maar bovenal een verbinder die finance en IT bij elkaar brengt. Met meer dan 20 jaar ervaring in uiteenlopende sectoren weet ik precies hoe complexe organisaties in elkaar zitten en waar de kansen liggen.\n        <\u002Fp>\n        <p class=\"reveal\">\n          Ik denk niet alleen in cijfers. Ik bouw. Van een handmatige Excelomgeving naar een <strong>geautomatiseerd dashboard<\u002Fstrong>, van een spaghetti aan processen naar een heldere, schaalbare structuur — zo snel mogelijk iets werkends neerzetten.\n        <\u002Fp>\n        <blockquote class=\"about-quote reveal\">\n          \"Business sense &amp; data-driven werken:<br>de combinatie die écht resultaat geeft.\"\n        <\u002Fblockquote>\n        <p class=\"reveal\">\n          Op zoek naar een freelance of interim professional die de brug slaat tussen finance, data en IT? Die zowel strategisch adviseert als operationeel meewerkt? Dan ben ik de persoon die je zoekt.\n        <\u002Fp>\n        <div class=\"tag-list reveal\">\n          <span class=\"tag\">Business sense<\u002Fspan>\n          <span class=\"tag\">Teamplayer<\u002Fspan>\n          <span class=\"tag\">Data-driven<\u002Fspan>\n          <span class=\"tag\">Hands-on<\u002Fspan>\n          <span class=\"tag\">Analytisch<\u002Fspan>\n          <span class=\"tag\">Pragmatisch<\u002Fspan>\n          <span class=\"tag\">Resultaatgericht<\u002Fspan>\n          <span class=\"tag\">Finance &amp; IT<\u002Fspan>\n          <span class=\"tag\">Dashboards<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WERKWIJZE -->\n<section id=\"aanpak\" class=\"method-section\">\n  <div class=\"container\">\n    <div class=\"section-label reveal\">Aanpak<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Zo werk ik<\u002Fh2>\n    <p class=\"section-intro reveal\">Geen eindeloze analyses zonder resultaat. Ik werk pragmatisch, data-gedreven en gericht op aantoonbare verbetering.<\u002Fp>\n    <div class=\"method-grid\">\n      <div class=\"method-card reveal\">\n        <span class=\"method-num\">01<\u002Fspan>\n        <div class=\"method-title\">Inzicht &amp; diagnose<\u002Fdiv>\n        <p class=\"method-desc\">Ik begin bij de financiële vraag achter de vraag. Waar lekt het geld? Welke KPI's ontbreken? Wat mist de organisatie om goed te kunnen sturen?<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"method-card reveal\">\n        <span class=\"method-num\">02<\u002Fspan>\n        <div class=\"method-title\">Structuur &amp; standaardisatie<\u002Fdiv>\n        <p class=\"method-desc\">Chaos maak ik beheersbaar. Van processen en rapportages tot dashboards en IT-inrichting — ik breng structuur, consistentie en schaalbaarheid.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"method-card reveal\">\n        <span class=\"method-num\">03<\u002Fspan>\n        <div class=\"method-title\">Implementatie &amp; borging<\u002Fdiv>\n        <p class=\"method-desc\">Van blauwdruk naar werkende oplossing. Ik begeleid de implementatie, train het team en zorg dat de nieuwe werkwijze beklijft.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DIENSTEN -->\n<section id=\"diensten\">\n  <div class=\"container\">\n    <div class=\"section-label reveal\">Diensten<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Waarvoor je mij inhuurt<\u002Fh2>\n    <p class=\"section-intro reveal\">Ik werk als freelancer of interim professional, solo of ingebed in jouw team. Flexibel, hands-on en met aantoonbaar resultaat.<\u002Fp>\n    <div class=\"services-grid\">\n      <div class=\"service-card reveal\" data-detail=\"Van maandafsluiting en prognoses tot portfoliocontrol en scenariomodellen. Ik richt uw planning &amp; control cyclus in op basis van uw behoeften — en zorg dat de cijfers kloppen én begrepen worden. Opdrachtgevers: ProRail, Essent, Liandon, Koning &amp; Hartman, ENRGY.\">\n        <div class=\"service-icon\">\n          <svg viewBox=\"0 0 16 16\"><path d=\"M2 12l3-4 3 2 3-5 3 3\"><\u002Fpath><path d=\"M1 14h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"service-title\">Business &amp; Project Control<\u002Fdiv>\n        <p class=\"service-desc\">Financiële sturing op alle niveaus — van maandrapportage en forecasting tot portfoliocontrol en scenariomodellering.<\u002Fp>\n        <div class=\"service-detail\"><\u002Fdiv>\n        <span class=\"service-arrow\">→<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"service-card reveal\" data-detail=\"Ik ontwerp en bouw managementdashboards in PowerBI en Excel die echt bruikbaar zijn. Geen statische rapporten maar live inzicht in KPI's, marges en capaciteit. Opdrachtgevers: Schmidt Global, ENRGY, Dr. Hauschka, Vredo, Liandon.\">\n        <div class=\"service-icon\">\n          <svg viewBox=\"0 0 16 16\"><rect x=\"1\" y=\"1\" width=\"6\" height=\"6\"><\u002Frect><rect x=\"9\" y=\"1\" width=\"6\" height=\"6\"><\u002Frect><rect x=\"1\" y=\"9\" width=\"6\" height=\"6\"><\u002Frect><rect x=\"9\" y=\"9\" width=\"6\" height=\"6\"><\u002Frect><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"service-title\">Dashboard &amp; Data-analyse<\u002Fdiv>\n        <p class=\"service-desc\">Van ruwe data naar beslissingsinformatie. PowerBI dashboards, KPI-structuren en managementrapportages die sturen op resultaat.<\u002Fp>\n        <div class=\"service-detail\"><\u002Fdiv>\n        <span class=\"service-arrow\">→<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"service-card reveal\" data-detail=\"Succesvolle implementaties van MS Dynamics AX, SAP en transport management systemen. Ik begeleid het volledige traject: blauwdruk, GAP-analyse, business process redesign, key user trainingen en go-live. Opdrachtgevers: NKM, Voice Data Services, Schmidt Global, Essent.\">\n        <div class=\"service-icon\">\n          <svg viewBox=\"0 0 16 16\"><circle cx=\"8\" cy=\"4\" r=\"2\"><\u002Fcircle><circle cx=\"3\" cy=\"13\" r=\"2\"><\u002Fcircle><circle cx=\"13\" cy=\"13\" r=\"2\"><\u002Fcircle><path d=\"M8 6v3M8 9l-3 2M8 9l3 2\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"service-title\">ERP &amp; IT-implementatie<\u002Fdiv>\n        <p class=\"service-desc\">Van blauwdruk tot go-live. Ik begeleid ERP-implementaties als business lead — met oog voor processen, mensen én techniek.<\u002Fp>\n        <div class=\"service-detail\"><\u002Fdiv>\n        <span class=\"service-arrow\">→<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"service-card reveal\" data-detail=\"Als interim manager Finance zorg ik voor continuïteit én verbetering. Van aansturing van het team tot herstructurering van processen, IT en rapportages. Opdrachtgevers: Dr. Hauschka Benelux (Finance, IT, Warehouse, Customer Service), African Parks Malawi.\">\n        <div class=\"service-icon\">\n          <svg viewBox=\"0 0 16 16\"><path d=\"M8 2v12M2 8h12\"><\u002Fpath><circle cx=\"8\" cy=\"8\" r=\"6\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"service-title\">Interim Finance Management<\u002Fdiv>\n        <p class=\"service-desc\">Tijdelijke versterking op managementniveau — met de rust, structuur en ervaring om financiële operaties snel op orde te krijgen.<\u002Fp>\n        <div class=\"service-detail\"><\u002Fdiv>\n        <span class=\"service-arrow\">→<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPERTISE -->\n<section id=\"expertise\" class=\"expertise-section\">\n  <div class=\"container\">\n    <div class=\"section-label reveal\">Expertise<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Wat ik meebreng<\u002Fh2>\n    <p class=\"section-intro reveal\">Brede ervaring over sectoren heen — van energie en telecom tot logistiek, zorg en non-profit in Afrika.<\u002Fp>\n    <div class=\"expertise-tags reveal\">\n      <span class=\"expertise-tag\" data-desc=\"Opstellen van begrotingen, prognoses en financiële rapportages op strategisch en operationeel niveau.\">Business Control<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Bewaking van project budgetten, voortgang, marges en risicobeheersing op project- en portfolioniveau.\">Project &amp; Portfolio Control<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Bouwen van PowerBI en Excel dashboards met live KPI-inzichten voor management en directie.\">PowerBI Dashboards<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Forecasting, scenariomodellering en financiële voorspelbaarheid als basis voor stuurinformatie.\">Forecasting &amp; KPI's<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Implementatie van MS Dynamics AX, SAP en sectorspecifieke systemen — van blauwdruk tot go-live.\">ERP-implementatie<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Digitalisering van planprocessen, automatisering van rapportages en interfacing tussen systemen.\">Procesautomatisering<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Aansturing van multidisciplinaire teams in verandertrajecten, van planning &amp; control tot IT-programma's.\">Projectmanagement<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Analyse van bedrijfsprocessen, identificeren van verbeterpotentieel en ontwerpen van nieuwe werkwijzen.\">Business Process Redesign<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Volledige verantwoordelijkheid voor Finance, IT, Warehouse en administratie in interim management rollen.\">Interim Management<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Inrichten van AO/IB, interne audits, financial controls en compliance-structuren.\">Internal Controls<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Vertalen van financiële businessvraagstukken naar IT-oplossingen en omgekeerd. De brug tussen finance en IT.\">Finance-IT brug<\u002Fspan>\n      <span class=\"expertise-tag\" data-desc=\"Sparringpartner voor directie en business unit managers op financieel-strategisch niveau.\">Directie-advisering<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- OPDRACHTGEVERS -->\n<div class=\"clients-bar\">\n  <div class=\"container\">\n    <div class=\"clients-label\">Eerder werkzaam voor en met<\u002Fdiv>\n    <div class=\"clients-grid\">\n      <div class=\"client-item\" data-info=\"Projectcontroller Betuweroute &amp; HSL · budgetten &gt;€100M · rapportage Raad van Bestuur\">ProRail<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Projectcontroller Duurzame Energie · SAP key user · IFRS-implementatie\">Essent<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Portfolio Controller, Teamleider P&amp;C en Projectmanager Projectbeheersing · 3 jaar\">Liandon<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Businesscontroller &amp; projectmanager ERP · manager Finance, IT, Warehouse, Customer Service\">Dr. Hauschka Benelux<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Businesscontroller · data driven decision making · dashboards omzet- &amp; capaciteitsvoorspelling\">ENRGY<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Businesscontroller · opzetten geld-goederenbeweging · transport management systeem NextUp\">Schmidt Global Relocations<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Programmamanager · ERP MS Dynamics AX2009 · 20-koppig programmateam\">NKM Network Services<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Business controller &amp; projectcontroller · maandrapportages, prognoses, sparringpartner BU managers\">Koning &amp; Hartman<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Projectmanager · ERP AX2009 · plansysteem met mobile workflow · ERP-klantintegratie via Biztalk\">Voice Data Services<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Businesscontroller · implementatie PowerBI\">Vredo Dodewaard<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Financieel Manager · business plan, budget, maandrapportages, interne audits · wildlife reservaat Malawi\">African Parks Network<\u002Fdiv>\n      <div class=\"client-item\" data-info=\"Sr. Financieel Specialist · interim opdrachten via Brunel Finance 2002–2007\">Brunel<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- QUOTES -->\n<section id=\"quotes\" class=\"quotes-section\">\n  <div class=\"container\">\n    <div class=\"section-label reveal\">Aanbevelingen<\u002Fdiv>\n    <h2 class=\"section-title reveal\">Wat anderen zeggen<\u002Fh2>\n    <div class=\"quotes-carousel reveal\">\n      <div class=\"quotes-grid\" id=\"quotes-grid\"><\u002Fdiv>\n      <div class=\"quotes-nav\">\n        <button class=\"quotes-prev\" onclick=\"quotesStep(-1)\">←<\u002Fbutton>\n        <div class=\"quotes-dots\" id=\"quotes-dots\"><\u002Fdiv>\n        <button class=\"quotes-next\" onclick=\"quotesStep(1)\">→<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"quotes-note reveal\">Via LinkedIn &nbsp;·&nbsp; <a href=\"https://www.linkedin.com/in/mdebruijn\" target=\"_blank\" style=\"color:var(--green-m);text-decoration:none;\">Meer aanbevelingen bekijken →<\u002Fa><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact\" class=\"contact-section\">\n  <div class=\"contact-inner\">\n    <div class=\"section-label reveal\">Contact<\u002Fdiv>\n    <h2 class=\"contact-title reveal\">Heb je een financieel<br>vraagstuk dat ik kan <em>oplossen?<\u002Fem><\u002Fh2>\n    <p class=\"contact-desc reveal\">Ik ga graag in gesprek — over jouw uitdaging, jouw context en wat ik daarin kan betekenen. Een korte kennismaking is altijd vrijblijvend.<\u002Fp>\n    <div class=\"contact-actions reveal\">\n      <a href=\"mailto:info@martijndebruijn.com\" class=\"btn-primary\">info@martijndebruijn.com<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/mdebruijn\" target=\"_blank\" class=\"btn-ghost\">LinkedIn →<\u002Fa>\n    <\u002Fdiv>\n    <p class=\"contact-meta reveal\">Beschikbaar voor freelance &amp; interim opdrachten &nbsp;·&nbsp; Utrecht regio &amp; Nederland<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-inner\">\n    <span class=\"footer-name\">Martijn de Bruijn<\u002Fspan>\n    <ul class=\"footer-links\">\n      <li><a href=\"#over-mij\">Over mij<\u002Fa><\u002Fli>\n      <li><a href=\"#aanpak\">Aanpak<\u002Fa><\u002Fli>\n      <li><a href=\"#diensten\">Diensten<\u002Fa><\u002Fli>\n      <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <div class=\"tweaks-title\">Tweaks<\u002Fdiv>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Accentkleur<\u002Fdiv>\n    <select id=\"tweak-color\" onchange=\"applyColor(this.value)\">\n      <option value=\"forest\" selected=\"\">Bosgroen (huidig)<\u002Foption>\n      <option value=\"navy\">Marineblauw<\u002Foption>\n      <option value=\"teal\">Teal<\u002Foption>\n      <option value=\"slate\">Leisteen<\u002Foption>\n      <option value=\"orange\">Amber<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Lettergrootte<\u002Fdiv>\n    <input type=\"range\" id=\"tweak-size\" min=\"14\" max=\"19\" step=\"1\" value=\"16\" oninput=\"applySize(this.value)\">\n    <div style=\"font-size:11px;color:#aaa;margin-top:4px\" id=\"size-val\">16px<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tweak-row\">\n    <div class=\"tweak-label\">Achtergrond<\u002Fdiv>\n    <select id=\"tweak-bg\" onchange=\"applyBg(this.value)\">\n      <option value=\"warm\" selected=\"\">Warm groen-wit<\u002Foption>\n      <option value=\"white\">Koel wit<\u002Foption>\n      <option value=\"cream\">Crème<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // SCROLL REVEAL\n  const revealEls = document.querySelectorAll('.reveal');\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        setTimeout(() => e.target.classList.add('visible'), 60);\n        observer.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });\n  revealEls.forEach(el => observer.observe(el));\n\n  // TWEAKS\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"color\": \"forest\",\n    \"size\": 16,\n    \"bg\": \"warm\"\n  }/*EDITMODE-END*/;\n  let state = {...TWEAK_DEFAULTS};\n\n  const colorMap = {\n    forest:  { green: 'oklch(36% 0.13 145)', greenL: 'oklch(93% 0.05 145)', greenM: 'oklch(52% 0.12 145)', dark: '#131D13' },\n    navy:    { green: 'oklch(36% 0.14 255)', greenL: 'oklch(93% 0.04 255)', greenM: 'oklch(54% 0.12 255)', dark: '#0e1220' },\n    teal:    { green: 'oklch(40% 0.13 195)', greenL: 'oklch(93% 0.05 195)', greenM: 'oklch(56% 0.12 195)', dark: '#0a1c1e' },\n    slate:   { green: 'oklch(38% 0.06 240)', greenL: 'oklch(93% 0.02 240)', greenM: 'oklch(54% 0.06 240)', dark: '#151820' },\n    orange:  { green: 'oklch(56% 0.17 48)',  greenL: 'oklch(94% 0.06 48)',  greenM: 'oklch(66% 0.14 48)',  dark: '#211408' },\n  };\n  const bgMap = {\n    warm:  { bg: '#F5F7F4', bgAlt: '#ECF0EA' },\n    white: { bg: '#FAFAFA', bgAlt: '#F2F2F2' },\n    cream: { bg: '#FAF6EE', bgAlt: '#F2EBE0' },\n  };\n\n  function applyColor(v) {\n    state.color = v;\n    const c = colorMap[v];\n    document.documentElement.style.setProperty('--green', c.green);\n    document.documentElement.style.setProperty('--green-l', c.greenL);\n    document.documentElement.style.setProperty('--green-m', c.greenM);\n    document.documentElement.style.setProperty('--bg-dark', c.dark);\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{color:v}}, '*');\n  }\n  function applySize(v) {\n    document.body.style.fontSize = v + 'px';\n    document.getElementById('size-val').textContent = v + 'px';\n    state.size = +v;\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{size:+v}}, '*');\n  }\n  function applyBg(v) {\n    state.bg = v;\n    const b = bgMap[v];\n    document.documentElement.style.setProperty('--bg', b.bg);\n    document.documentElement.style.setProperty('--bg-alt', b.bgAlt);\n    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bg:v}}, '*');\n  }\n\n  applyColor(state.color);\n  applySize(state.size);\n  applyBg(state.bg);\n\n  // SERVICE CARDS\n  document.querySelectorAll('.service-card').forEach(card => {\n    const detail = card.querySelector('.service-detail');\n    if (detail) detail.textContent = card.dataset.detail || '';\n    card.addEventListener('click', () => {\n      const isOpen = card.classList.contains('open');\n      document.querySelectorAll('.service-card').forEach(c => c.classList.remove('open'));\n      if (!isOpen) card.classList.add('open');\n    });\n  });\n\n  // EXPERTISE TAG TOOLTIPS\n  const popover = document.createElement('div');\n  popover.className = 'client-popover';\n  document.body.appendChild(popover);\n\n  document.querySelectorAll('.expertise-tag[data-desc]').forEach(tag => {\n    tag.addEventListener('mouseenter', () => {\n      popover.textContent = tag.dataset.desc;\n      popover.classList.add('visible');\n    });\n    tag.addEventListener('mousemove', e => {\n      popover.style.left = (e.clientX + 14) + 'px';\n      popover.style.top  = (e.clientY - 10) + 'px';\n    });\n    tag.addEventListener('mouseleave', () => popover.classList.remove('visible'));\n  });\n\n  // CLIENT POPOVERS\n  document.querySelectorAll('.client-item').forEach(el => {\n    el.addEventListener('mouseenter', () => {\n      if (!el.dataset.info) return;\n      popover.textContent = el.dataset.info;\n      popover.classList.add('visible');\n    });\n    el.addEventListener('mousemove', e => {\n      popover.style.left = (e.clientX + 14) + 'px';\n      popover.style.top  = (e.clientY - 10) + 'px';\n    });\n    el.addEventListener('mouseleave', () => popover.classList.remove('visible'));\n  });\n\n  // QUOTES CAROUSEL\n  const allQuotes = [\n    {\n      text: \"Martijn speelde een belangrijke rol in het vertalen van de business eisen naar haalbare IT oplossingen. Als inhoudelijk financieel specialist wist hij zich goed in te leven in de IT uitdagingen. Dat tezamen met het managen van de relevante stakeholders leverde de geplande resultaten op.\",\n      name: \"Ton Sanders\",\n      role: \"Streamlead GET operations bij ENGIE Energie Nederland\"\n    },\n    {\n      text: \"Ik heb Martijn leren kennen als iemand met een grote betrokkenheid tijdens diverse IT projecten. Zijn kennis t.a.v. de diverse bedrijfsprocessen, zowel financieel als niet financieel, is zeer goed. Dit alles heeft ervoor gezorgd dat onze IT projecten binnen begroting en tijdsplanning zijn opgeleverd.\",\n      name: \"Max Daniels\",\n      role: \"Manager ICT bij Koning &amp; Hartman\"\n    },\n    {\n      text: \"Martijn is a bright and enthusiastic financial professional, easy to work with, a quick learner and a good communicator. He understands the delicate process of obtaining the balance between the company's financial guidelines and dealing with wishes and pressure from business units. He is a true teamplayer.\",\n      name: \"Frank Minnee\",\n      role: \"Financieel Directeur bij MAAT\"\n    },\n    {\n      text: \"Martijn is een zeer goede Finance professional. Hij is enthousiast, leergierig, sterk analytisch en communicatief sterk. Mede door zijn persoonlijkheid en uitstraling weet hij snel het vertrouwen binnen een organisatie te winnen om gedegen zijn werk te kunnen doen.\",\n      name: \"Erwin Beaufort\",\n      role: \"Senior Recruiter, Brunel Finance Utrecht\"\n    },\n    {\n      text: \"Martijn is een zeer gedreven, enthousiast en doelgericht persoon, die door zijn professionaliteit en inzicht makkelijk veranderingsprocessen binnen de organisatie op financieel gebied kan implementeren. Het is zeer prettig om met Martijn samen te werken.\",\n      name: \"Richard den Braber\",\n      role: \"BUM Carriers &amp; Service Providers bij Axians\"\n    },\n    {\n      text: \"Martijn is een betrouwbare en intelligente persoonlijkheid, iemand die zich snel aanpast aan omgeving zowel qua kennis als qua organisatie. Al snel lijkt het alsof hij al jaren één van de collega's is. Martijn in je organisatie zorgt voor rust en betrouwbaarheid.\",\n      name: \"Brian Payralbe\",\n      role: \"Projectleider\"\n    },\n  ];\n\n  const PER_PAGE = 3;\n  let quotesPage = 0;\n  const totalPages = Math.ceil(allQuotes.length / PER_PAGE);\n  const grid = document.getElementById('quotes-grid');\n  const dotsEl = document.getElementById('quotes-dots');\n\n  for (let i = 0; i < totalPages; i++) {\n    const d = document.createElement('div');\n    d.className = 'quotes-dot' + (i === 0 ? ' active' : '');\n    d.onclick = () => { quotesPage = i; renderQuotes(true); };\n    dotsEl.appendChild(d);\n  }\n\n  function renderQuotes(animate) {\n    if (animate) {\n      grid.classList.add('fading');\n      setTimeout(() => { fillQuotes(); grid.classList.remove('fading'); }, 340);\n    } else {\n      fillQuotes();\n    }\n    dotsEl.querySelectorAll('.quotes-dot').forEach((d, i) => d.classList.toggle('active', i === quotesPage));\n  }\n\n  function fillQuotes() {\n    grid.innerHTML = '';\n    const start = quotesPage * PER_PAGE;\n    allQuotes.slice(start, start + PER_PAGE).forEach(q => {\n      grid.innerHTML += `<blockquote class=\"quote-card\">\n        <p class=\"quote-text\">\"${q.text}\"<\u002Fp>\n        <footer class=\"quote-author\">\n          <div class=\"quote-name\">${q.name}<\u002Fdiv>\n          <div class=\"quote-role\">${q.role}<\u002Fdiv>\n        <\u002Ffooter>\n      <\u002Fblockquote>`;\n    });\n  }\n\n  window.quotesStep = function(dir) {\n    quotesPage = (quotesPage + dir + totalPages) % totalPages;\n    renderQuotes(true);\n  };\n\n  let autoTimer = setInterval(() => quotesStep(1), 7000);\n  grid.addEventListener('mouseenter', () => clearInterval(autoTimer));\n  grid.addEventListener('mouseleave', () => { autoTimer = setInterval(() => quotesStep(1), 7000); });\n  renderQuotes();\n\n  // TWEAKS TOGGLE\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');\n    if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');\n  });\n  window.parent.postMessage({type: '__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
